<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Formula Database</title>
<meta name="description" content="A fast, searchable reference for CAT quantitative formulas — Arithmetic, Algebra, Geometry, Number Systems, and Probability.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS — Warm Monochrome (minimalist-ui protocol)
═══════════════════════════════════════════════════════ */
:root {
  /* Canvas */
  --canvas:      #FBFBFA;
  --surface:     #FFFFFF;
  --surface-2:   #F7F6F3;
  --surface-3:   #F0EFEc;

  /* Borders */
  --border:      rgba(0,0,0,0.07);
  --border-med:  rgba(0,0,0,0.11);
  --border-str:  rgba(0,0,0,0.18);

  /* Text — warm charcoal, never pure black */
  --ink:         #1A1917;
  --ink-2:       #3D3B36;
  --ink-3:       #787774;
  --ink-4:       #AEACA8;

  /* Accent — single warm amber, highly desaturated */
  --accent:      #B45309;
  --accent-bg:   #FBF3DB;

  /* Typography */
  --sans:        'DM Sans', 'Helvetica Neue', system-ui, sans-serif;
  --mono:        'DM Mono', 'SF Mono', monospace;

  /* Easing */
  --out:         cubic-bezier(0.23, 1, 0.32, 1);
  --drawer:      cubic-bezier(0.32, 0.72, 0, 1);

  /* Layout */
  --header-h:    52px;
  --tabs-h:      42px;
  --max-w:       620px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --canvas:      #141412;
    --surface:     #1C1B19;
    --surface-2:   #242320;
    --surface-3:   #2E2D2A;
    --border:      rgba(255,255,255,0.06);
    --border-med:  rgba(255,255,255,0.10);
    --border-str:  rgba(255,255,255,0.18);
    --ink:         #F5F4F0;
    --ink-2:       #C9C7C0;
    --ink-3:       #7A7872;
    --ink-4:       #4A4845;
    --accent:      #D97706;
    --accent-bg:   #292008;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ═══════════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--sans);
  background: var(--canvas);
  color: var(--ink);
  line-height: 1.55;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

a    { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; -webkit-tap-highlight-color: transparent; }
input  { font: inherit; color: inherit; }

#app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ═══════════════════════════════════════════════════════
   SKIP LINK (accessibility)
═══════════════════════════════════════════════════════ */
.skip-link {
  position: absolute;
  top: -40px;
  left: 16px;
  background: var(--ink);
  color: var(--canvas);
  padding: 6px 12px;
  font-size: 13px;
  border-radius: 4px;
  z-index: 999;
  transition: top 120ms;
}
.skip-link:focus { top: 8px; }

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-h);
  background: color-mix(in srgb, var(--canvas) 88%, transparent);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
}

/* Wordmark */
#wordmark {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  line-height: 1.1;
  gap: 1px;
}
#wordmark-primary {
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.025em;
  color: var(--ink);
}
#wordmark-secondary {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-4);
}

/* Search */
#search-wrap {
  flex: 1;
  position: relative;
  max-width: 300px;
}

#search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-4);
  pointer-events: none;
  display: flex;
}

#search-input {
  width: 100%;
  height: 32px;
  background: var(--surface);
  border: 1px solid var(--border-med);
  border-radius: 7px;
  padding: 0 36px 0 32px;
  font-size: 13px;
  outline: none;
  transition: border-color 140ms var(--out), box-shadow 140ms var(--out);
}
#search-input::placeholder { color: var(--ink-4); }
#search-input:focus {
  border-color: var(--border-str);
  box-shadow: 0 0 0 3px rgba(180,83,9,0.10);
}

#kbd-hint {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-4);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  pointer-events: none;
  transition: opacity 140ms var(--out);
}
#search-input:focus ~ #kbd-hint { opacity: 0; }

/* ═══════════════════════════════════════════════════════
   SEARCH RESULTS DROPDOWN
═══════════════════════════════════════════════════════ */
#search-results {
  position: absolute;
  top: calc(100% + 5px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border-med);
  border-radius: 10px;
  z-index: 300;
  overflow: hidden;
  max-height: 60dvh;
  overflow-y: auto;
  box-shadow: 0 8px 32px -4px rgba(0,0,0,0.12), 0 2px 8px -2px rgba(0,0,0,0.06);
  opacity: 0;
  transform: translateY(-6px) scale(0.98);
  transform-origin: top center;
  pointer-events: none;
  transition: opacity 180ms var(--out), transform 180ms var(--out);
}
#search-results.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.sr-item {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 70ms;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover, .sr-item:focus { background: var(--surface-2); outline: none; }
.sr-title { font-size: 13px; font-weight: 500; flex-shrink: 0; }
.sr-path  { font-size: 11px; color: var(--ink-3); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sr-empty { padding: 22px 14px; text-align: center; font-size: 13px; color: var(--ink-3); }

/* ═══════════════════════════════════════════════════════
   SUBJECT TABS  — matches mobile mockup's horizontal scroll
═══════════════════════════════════════════════════════ */
#tabs-bar {
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  height: var(--tabs-h);
  background: color-mix(in srgb, var(--canvas) 92%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

#tabs {
  display: flex;
  align-items: stretch;
  height: 100%;
  padding: 0 14px;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  height: 100%;
  padding: 0 13px;
  font-size: 13.5px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--ink-3);
  white-space: nowrap;
  position: relative;
  border-bottom: 2px solid transparent;
  transition: color 150ms var(--out);
}
/* Active indicator — slides in from 0 width */
.tab-btn::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10px; right: 10px;
  height: 2px;
  background: var(--ink);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 200ms var(--out);
}
.tab-btn.active {
  color: var(--ink);
  font-weight: 500;
}
.tab-btn.active::after { transform: scaleX(1); }

@media (hover: hover) and (pointer: fine) {
  .tab-btn:not(.active):hover { color: var(--ink-2); }
  .tab-btn:active { transform: scale(0.96); }
}

/* ═══════════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════════ */
#main {
  flex: 1;
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* ═══════════════════════════════════════════════════════
   LIST VIEW — Chapter accordion
═══════════════════════════════════════════════════════ */
#list-view { display: block; }
#list-view.hidden { display: none; }

/* Chapter row */
.chapter { border-bottom: 1px solid var(--border); }

.chapter-header {
  display: flex;
  align-items: center;
  gap: 12px;
  height: 50px;
  padding: 0 18px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 80ms;
}
@media (hover: hover) and (pointer: fine) {
  .chapter-header:hover { background: var(--surface-2); }
  .chapter-header:active { background: var(--surface-3); }
}

.chapter-arrow {
  flex-shrink: 0;
  width: 14px;
  height: 14px;
  color: var(--ink-4);
  transition: transform 220ms var(--out), color 150ms;
}
.chapter.open .chapter-arrow {
  transform: rotate(90deg);
  color: var(--ink-3);
}

.chapter-name {
  flex: 1;
  font-size: 14.5px;
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--ink-2);
  transition: color 120ms;
}
.chapter.open .chapter-name,
.chapter-header:hover .chapter-name { color: var(--ink); }

.chapter-count {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-4);
  font-variant-numeric: tabular-nums;
}

/* Expand animation via grid-template-rows */
.chapter-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 220ms var(--drawer);
}
.chapter.open .chapter-body { grid-template-rows: 1fr; }
.chapter.closing .chapter-body {
  transition: grid-template-rows 140ms var(--out);
}
.chapter-inner { overflow: hidden; }

/* Formula rows — match mobile mockup exactly */
.formula-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  height: 46px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 70ms;

  /* stagger entrance */
  opacity: 0;
  transform: translateY(3px);
}
.chapter.open .formula-row {
  animation: row-in 200ms var(--out) forwards;
  animation-delay: calc(var(--i, 0) * 28ms);
}
@keyframes row-in {
  to { opacity: 1; transform: translateY(0); }
}

@media (hover: hover) and (pointer: fine) {
  .formula-row:hover { background: var(--surface-2); }
  .formula-row:active { background: var(--surface-3); transform: scale(0.995); }
}
.formula-row.active {
  background: var(--accent-bg);
}

/* Document icon (inline SVG — no external lib) */
.formula-icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  transition: border-color 120ms, color 120ms;
}
.formula-row:hover .formula-icon,
.formula-row.active .formula-icon {
  border-color: var(--border-med);
  color: var(--ink-2);
}

.formula-title {
  flex: 1;
  font-size: 13.5px;
  font-weight: 400;
  color: var(--ink-2);
  letter-spacing: -0.01em;
  transition: color 100ms;
}
.formula-row:hover .formula-title,
.formula-row.active .formula-title { color: var(--ink); }

.formula-chevron {
  flex-shrink: 0;
  color: var(--ink-4);
  transition: color 100ms, transform 120ms var(--out);
}
.formula-row:hover .formula-chevron {
  color: var(--ink-3);
  transform: translateX(2px);
}

/* ═══════════════════════════════════════════════════════
   FORMULA PAGE
═══════════════════════════════════════════════════════ */
#formula-page {
  display: none;
  padding: 22px 20px 72px;
}
#formula-page.visible {
  display: block;
  animation: page-in 240ms var(--out) both;
}
@keyframes page-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Back */
#back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--ink-3);
  padding: 5px 10px 5px 6px;
  border-radius: 6px;
  margin-bottom: 18px;
  margin-left: -6px;
  transition: color 120ms var(--out), background 120ms var(--out);
}
#back-btn:hover { color: var(--ink); background: var(--surface-2); }
@media (hover: hover) and (pointer: fine) {
  #back-btn:active { transform: scale(0.97); }
}

/* Breadcrumb */
#breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 3px 5px;
  font-size: 11.5px;
  color: var(--ink-4);
  margin-bottom: 22px;
  line-height: 1.4;
}
.bc-item {
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 100ms, background 100ms;
}
.bc-item:hover { color: var(--ink-2); background: var(--surface-2); }
.bc-sep { color: var(--border-str); }
.bc-current { color: var(--ink-2); font-weight: 500; padding: 2px 0; }

/* ═══════════════════════════════════════════════════════
   FORMULA CONTENT — Markdown rendered
═══════════════════════════════════════════════════════ */
#formula-content {
  font-size: 14px;
  line-height: 1.72;
  color: var(--ink-2);
}

#formula-content h1 {
  font-size: 23px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 26px;
  text-wrap: balance;
}
#formula-content h2 {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  color: var(--ink-4);
  margin: 34px 0 10px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
#formula-content h3 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 20px 0 6px;
}
#formula-content p { margin-bottom: 12px; }
#formula-content ul, #formula-content ol { margin: 6px 0 14px 18px; }
#formula-content li { margin-bottom: 5px; }
#formula-content strong { font-weight: 600; color: var(--ink); }
#formula-content a { color: var(--accent); text-underline-offset: 3px; text-decoration: underline; }

#formula-content code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--ink);
}
#formula-content pre {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  overflow-x: auto;
  margin: 14px 0;
}
#formula-content pre code { background: none; border: none; padding: 0; font-size: 13px; }

#formula-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 28px 0;
}

/* Math block wrapper */
.math-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 18px;
  margin: 16px 0;
  overflow-x: auto;
}
#formula-content .katex-display { overflow-x: auto; padding: 16px 0; margin: 0; }
#formula-content .katex { font-size: 1.08em; }

/* Empty state */
.empty-state {
  margin-top: 12px;
}
.empty-label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 12.5px;
  color: var(--ink-3);
  background: var(--surface-2);
  border: 1px dashed var(--border-med);
  border-radius: 7px;
  padding: 11px 15px;
}

/* Skeleton loader */
.skel-wrap { display: flex; flex-direction: column; gap: 10px; padding-top: 2px; }
.skel {
  background: var(--surface-2);
  border-radius: 5px;
  animation: skel-pulse 1.6s ease-in-out infinite alternate;
}
@keyframes skel-pulse { from { opacity: 0.5; } to { opacity: 1; } }

/* ═══════════════════════════════════════════════════════
   DESKTOP REFINEMENTS
═══════════════════════════════════════════════════════ */
@media (min-width: 680px) {
  #header  { padding: 0 28px; }
  #tabs    { padding: 0 22px; }
  .chapter-header   { padding: 0 28px; height: 52px; }
  .formula-row      { padding: 0 28px; }
  #formula-page     { padding: 28px 28px 80px; max-width: var(--max-w); }
  #formula-content h1 { font-size: 26px; }
}

@media (min-width: 900px) {
  :root { --max-w: 680px; }
}
</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<div id="app">

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header id="header">
    <div id="wordmark" role="banner">
      <span id="wordmark-primary">CAT Formulas</span>
      <span id="wordmark-secondary">Quant Reference</span>
    </div>

    <div id="search-wrap">
      <span id="search-icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
          <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.2" y1="10.2" x2="14.5" y2="14.5"/>
        </svg>
      </span>
      <input
        id="search-input"
        type="search"
        placeholder="Search formulas…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search formulas"
        aria-autocomplete="list"
        aria-controls="search-results"
        aria-haspopup="listbox"
      >
      <kbd id="kbd-hint" aria-hidden="true">/</kbd>
      <div id="search-results" role="listbox" aria-label="Search results"></div>
    </div>
  </header>

  <!-- ═══ SUBJECT TABS ═════════════════════════════════════ -->
  <nav id="tabs-bar" aria-label="Subject">
    <div id="tabs" role="tablist"></div>
  </nav>

  <!-- ═══ CONTENT ══════════════════════════════════════════ -->
  <main id="main">

    <!-- List view -->
    <div id="list-view" aria-label="Formula list"></div>

    <!-- Formula page -->
    <div id="formula-page" role="article">
      <button id="back-btn" aria-label="Back to list">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="10 3 6 8 10 13"/>
        </svg>
        Back
      </button>
      <nav id="breadcrumb" aria-label="You are here"></nav>
      <div id="formula-content"></div>
    </div>

  </main>
</div><!-- #app -->

<script>
/* ════════════════════════════════════════════════════════
   DATA
════════════════════════════════════════════════════════ */
const TREE = {
  "Arithmetic": {
    "Averages, Ratio & Proportion": [
      "Averages","Operations on Ratios","Percentage Change",
      "Proportionality","Ratio Properties","Successive Percentage Change"
    ],
    "Interest": [
      "CI & SI - Difference Formulas","CI - Compounding Non-Annually",
      "Installments","Simple & Compound Interest"
    ],
    "Mixtures & Solutions": [
      "Alligation - Three Solutions","Mixture of Mixtures",
      "Replacement of Solution","Weighted Average of Concentrations"
    ],
    "Profit & Loss": [
      "Fake Weights","Partnership & Profit Sharing",
      "SP - CP - Discount - Marked Price","Successive Profit & Loss"
    ],
    "Time & Work": ["Tank - Pipes","Work - Efficiency"],
    "Time, Speed & Distance": [
      "Average Speed","Boats & Streams","Circular Tracks",
      "Clocks - Relative Velocity","Escalators","Linear Tracks",
      "Relative Velocity","Speed - Distance - Time","Trains",
      "m-s to km-hr Conversion"
    ]
  },
  "Algebra": {
    "Functions, Graphs & Statistics": ["Algebra Identities","Composite Functions","Domain & Range"],
    "Inequalities": [
      "Linear & Quadratic Inequalities","Modulus Properties",
      "Properties of Inequalities","Sign Change - Polynomial Inequality"
    ],
    "Linear Equations": [
      "Chicken McNugget Theorem",
      "Linear Equation - Sum of Reciprocal Variables",
      "Linear Equation Slope",
      "Linear Equation in 3 Variables - When Two Equations are Same",
      "Linear Equations - Integral Solutions",
      "Number of Solutions - 3 Variable Equations (Determinant Method)",
      "Number of Solutions - Linear Equations",
      "Solving Linear Equations - 2 Variables",
      "Solving Linear Equations - 3 Variables",
      "Special Linear Equations"
    ],
    "Logarithms, Surds & Indices": ["Decimal into Fraction","Logarithmic Inequality","Properties of Logarithm"],
    "Progressions & Series": [
      "A.G.P. Properties","A.P. - Formulas & Properties","AM-GM-HM Inequality",
      "Arithmetic Mean","Common Terms in Two APs","G.P. - Formulas & Properties",
      "Geometric Mean","Harmonic Mean","Harmonic Progression - Properties",
      "Second Order AP","Sum of Special Series till 'n' Terms"
    ],
    "Quadratic Equations": [
      "Deriving New Equations from Modified Roots","Discriminant Formulas",
      "Polynomial Equation - Roots Formulas","Quadratic - Extreme Values",
      "Quadratic Roots Formulas","Signs of the Roots"
    ]
  },
  "Geometry": {
    "Geometry": [
      "Angles - Transversal & Parallel Lines","Angles Subtended on a Circle",
      "Characteristics of Four Quadrants","Circle - Chord Properties",
      "Circle - Formulae","Coordinate Geometry - Circle & Triangle",
      "Coordinate Geometry - Straight Lines","Number of Triangles - Given Perimeter",
      "Pick's Theorem","Properties of Hexagon & Octagon","Properties of Polygons",
      "Properties of Quadrilaterals","Properties of Tangents & Chords in a Circle",
      "Quadrilateral - Areas & Properties","Similarity & Congruency of Triangles",
      "Solids - Volume","Surface Area of Solids","Tangents on a Circle",
      "Triangles - Area of Types of Triangles",
      "Triangles - Area through Inradius & Circumradius","Triangles - Area",
      "Triangles - Centroid, Circumradius & Inradius","Triangles - Key Terms",
      "Triangles - Theorems","Triangles Basics",
      "Trigonometry - Formulas & Properties","Trigonometry - Geometry"
    ]
  },
  "Number System": {
    "Number Systems": [
      "Base System","Basics of Factorial","Chinese Remainder Theorem","Cyclicity",
      "Divisibility Rules for Power Expressions","Divisibility by Different Numbers",
      "Euler Totient","HCF & LCM","Highest Power of a Number in a Factorial",
      "Last Non-Zero Digit for Factorials","Number of Trailing Zeros",
      "Properties of Factors","Remainder Properties","Remainder Theorems"
    ]
  },
  "Probability": {
    "Probability & Combinatorics": [
      "Arrangement with Repetitions",
      "Arrangement, Permutation & Combination Formulas",
      "Basic Counting","Basic Probability","Bayes Theorem",
      "Binomial Theorem","Circular Arrangement","Derangements","Expected Value",
      "Fundamental Principle of Probability Theory","Number of Integral Solutions",
      "Partitioning","Pigeonhole Principle","Probability Formulas","Rank of a Word"
    ],
    "Venn Diagrams": ["2 Set Venn Diagram","3 Set Venn Diagram","Sets - Properties"]
  }
};

/* Search index */
const INDEX = [];
for (const [subj, chs] of Object.entries(TREE))
  for (const [chap, fms] of Object.entries(chs))
    for (const f of fms)
      INDEX.push({ subject: subj, chapter: chap, title: f,
        path: `${subj}/${chap}/${f}.md` });

/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
let activeSubject = "Arithmetic";
let openChapter   = "Averages, Ratio & Proportion";
let activeFormula = null;

/* ════════════════════════════════════════════════════════
   ELEMENTS
════════════════════════════════════════════════════════ */
const $tabs    = document.getElementById("tabs");
const $list    = document.getElementById("list-view");
const $page    = document.getElementById("formula-page");
const $content = document.getElementById("formula-content");
const $bc      = document.getElementById("breadcrumb");
const $srch    = document.getElementById("search-input");
const $res     = document.getElementById("search-results");
const $back    = document.getElementById("back-btn");

/* ════════════════════════════════════════════════════════
   TABS
════════════════════════════════════════════════════════ */
function renderTabs() {
  $tabs.innerHTML = "";
  for (const s of Object.keys(TREE)) {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (s === activeSubject ? " active" : "");
    btn.textContent = s;
    btn.setAttribute("role", "tab");
    btn.setAttribute("aria-selected", String(s === activeSubject));
    btn.addEventListener("click", () => {
      activeSubject = s;
      openChapter = Object.keys(TREE[s])[0];
      renderTabs(); renderList(); showList();
    });
    $tabs.appendChild(btn);
  }
}

/* ════════════════════════════════════════════════════════
   ACCORDION LIST
════════════════════════════════════════════════════════ */
/* Inline SVG icons — no external deps */
const ICON_DOC = `<svg width="12" height="14" viewBox="0 0 12 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1" y="1" width="10" height="12" rx="2"/><line x1="3.5" y1="4.5" x2="8.5" y2="4.5"/><line x1="3.5" y1="7" x2="8.5" y2="7"/><line x1="3.5" y1="9.5" x2="6.5" y2="9.5"/></svg>`;
const ICON_CHV = `<svg width="6" height="11" viewBox="0 0 6 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 1 5 5.5 1 10"/></svg>`;
const ICON_ARR = `<svg class="chapter-arrow" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 4 10 8 6 12"/></svg>`;

function renderList() {
  $list.innerHTML = "";
  for (const [chap, fms] of Object.entries(TREE[activeSubject])) {
    const isOpen = chap === openChapter;

    /* Chapter wrapper */
    const wrap = document.createElement("div");
    wrap.className = "chapter" + (isOpen ? " open" : "");
    wrap.dataset.chapter = chap;

    /* Header */
    const hdr = document.createElement("div");
    hdr.className = "chapter-header";
    hdr.setAttribute("role", "button");
    hdr.setAttribute("tabindex", "0");
    hdr.setAttribute("aria-expanded", String(isOpen));
    hdr.innerHTML = `
      ${ICON_ARR}
      <span class="chapter-name">${esc(chap)}</span>
      <span class="chapter-count">${fms.length}</span>`;

    /* Body */
    const body  = document.createElement("div");
    body.className = "chapter-body";
    const inner = document.createElement("div");
    inner.className = "chapter-inner";

    fms.forEach((f, i) => {
      const row = document.createElement("div");
      const isActive = activeFormula &&
        activeFormula.title === f && activeFormula.chapter === chap;
      row.className = "formula-row" + (isActive ? " active" : "");
      row.setAttribute("tabindex", "0");
      row.setAttribute("role", "link");
      row.dataset.subject = activeSubject;
      row.dataset.chapter = chap;
      row.dataset.title   = f;
      row.style.setProperty("--i", i);
      row.innerHTML = `
        <span class="formula-icon">${ICON_DOC}</span>
        <span class="formula-title">${esc(f)}</span>
        <span class="formula-chevron">${ICON_CHV}</span>`;
      row.addEventListener("click",   () => openFormula(row));
      row.addEventListener("keydown", e => { if (e.key === "Enter") openFormula(row); });
      inner.appendChild(row);
    });

    body.appendChild(inner);
    wrap.appendChild(hdr);
    wrap.appendChild(body);

    hdr.addEventListener("click",   () => toggleChapter(wrap));
    hdr.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleChapter(wrap); }
    });

    $list.appendChild(wrap);
  }
}

function toggleChapter(wrap) {
  const name      = wrap.dataset.chapter;
  const wasOpen   = wrap.classList.contains("open");

  document.querySelectorAll(".chapter.open").forEach(c => {
    c.classList.add("closing");
    c.classList.remove("open");
    c.querySelector(".chapter-header").setAttribute("aria-expanded", "false");
    c.addEventListener("transitionend", () => c.classList.remove("closing"), { once: true });
  });

  if (!wasOpen) {
    openChapter = name;
    wrap.classList.remove("closing");
    wrap.classList.add("open");
    wrap.querySelector(".chapter-header").setAttribute("aria-expanded", "true");
  } else {
    openChapter = null;
  }
}

/* ════════════════════════════════════════════════════════
   FORMULA PAGE
════════════════════════════════════════════════════════ */
function openFormula(row) {
  showFormula({
    subject: row.dataset.subject,
    chapter: row.dataset.chapter,
    title:   row.dataset.title,
    path:    `${row.dataset.subject}/${row.dataset.chapter}/${row.dataset.title}.md`
  });
}

async function showFormula(item) {
  activeFormula = item;

  /* Sync active state in list */
  document.querySelectorAll(".formula-row").forEach(r =>
    r.classList.toggle("active",
      r.dataset.title === item.title && r.dataset.chapter === item.chapter));

  /* Breadcrumb */
  $bc.innerHTML = `
    <span class="bc-item">${esc(item.subject)}</span>
    <span class="bc-sep">/</span>
    <span class="bc-item">${esc(item.chapter)}</span>
    <span class="bc-sep">/</span>
    <span class="bc-current">${esc(item.title)}</span>`;
  $bc.querySelectorAll(".bc-item").forEach(b =>
    b.addEventListener("click", () => {
      activeSubject = item.subject; openChapter = item.chapter;
      renderTabs(); renderList(); showList();
    }));

  /* Skeleton */
  $content.innerHTML = `
    <div class="skel-wrap">
      <div class="skel" style="height:26px;width:52%"></div>
      <div class="skel" style="height:13px;width:88%;animation-delay:.1s"></div>
      <div class="skel" style="height:13px;width:72%;animation-delay:.2s"></div>
      <div class="skel" style="height:64px;width:100%;margin-top:6px;animation-delay:.15s;border-radius:8px"></div>
      <div class="skel" style="height:13px;width:80%;animation-delay:.25s"></div>
      <div class="skel" style="height:13px;width:60%;animation-delay:.3s"></div>
    </div>`;

  /* Transition */
  $page.classList.remove("visible");
  $list.classList.add("hidden");
  void $page.offsetWidth;
  $page.style.display = "block";
  $page.classList.add("visible");
  window.scrollTo({ top: 0, behavior: "instant" });

  /* Fetch */
  try {
    const r = await fetch(item.path);
    if (!r.ok) throw new Error();
    renderMd(await r.text());
  } catch {
    $content.innerHTML = `
      <h1>${esc(item.title)}</h1>
      <div class="empty-state">
        <span class="empty-label">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
          Formula content coming soon
        </span>
      </div>`;
  }
}

function renderMd(md) {
  $content.innerHTML = marked.parse(md, { gfm: true, breaks: false });
  /* Wrap display math */
  $content.querySelectorAll(".katex-display").forEach(el => {
    const w = document.createElement("div");
    w.className = "math-block";
    el.parentNode.insertBefore(w, el);
    w.appendChild(el);
  });
  if (window.renderMathInElement) {
    renderMathInElement($content, {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$",  right: "$",  display: false },
        { left: "\\[", right: "\\]", display: true },
        { left: "\\(", right: "\\)", display: false }
      ],
      throwOnError: false
    });
  }
}

function showList() {
  $page.classList.remove("visible");
  $page.style.display = "none";
  $list.classList.remove("hidden");
  activeFormula = null;
  document.querySelectorAll(".formula-row.active").forEach(r => r.classList.remove("active"));
}

$back.addEventListener("click", showList);

/* ════════════════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════════════════ */
$srch.addEventListener("input", debounce(doSearch, 90));
$srch.addEventListener("focus", () => { if ($srch.value.trim()) doSearch(); });
document.addEventListener("click", e => { if (!e.target.closest("#search-wrap")) closeSearch(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeSearch(); $srch.blur(); }
  if (e.key === "/" && document.activeElement !== $srch
      && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) {
    e.preventDefault(); $srch.focus(); $srch.select();
  }
});

function doSearch() {
  const q = $srch.value.trim().toLowerCase();
  if (!q) { closeSearch(); return; }
  const hits = INDEX.filter(x =>
    x.title.toLowerCase().includes(q) ||
    x.chapter.toLowerCase().includes(q) ||
    x.subject.toLowerCase().includes(q)
  ).slice(0, 10);

  $res.innerHTML = hits.length
    ? hits.map((h, i) => `
        <div class="sr-item" role="option" tabindex="0" data-i="${i}">
          <span class="sr-title">${mark(h.title, q)}</span>
          <span class="sr-path">${esc(h.subject)} · ${esc(h.chapter)}</span>
        </div>`).join("")
    : `<div class="sr-empty">No results for "${esc(q)}"</div>`;

  $res.querySelectorAll(".sr-item").forEach((el, i) => {
    el.addEventListener("click",   () => pick(hits[i]));
    el.addEventListener("keydown", e => { if (e.key === "Enter") pick(hits[i]); });
  });
  $res.classList.add("open");
}

function pick(item) {
  closeSearch(); $srch.value = "";
  activeSubject = item.subject; openChapter = item.chapter;
  renderTabs(); renderList(); showFormula(item);
}

function closeSearch() {
  $res.classList.remove("open");
  $res.addEventListener("transitionend", () => {
    if (!$res.classList.contains("open")) $res.innerHTML = "";
  }, { once: true });
}

function mark(text, q) {
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0, i))
    + `<mark style="background:var(--accent-bg);color:var(--accent);border-radius:2px;padding:0 1px">${esc(text.slice(i, i + q.length))}</mark>`
    + esc(text.slice(i + q.length));
}

/* ════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

/* ════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════ */
renderTabs();
renderList();
</script>
</body>
</html>
